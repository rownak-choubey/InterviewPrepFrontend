name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

env:
  REGISTRY: ap-mumbai-1.ocir.io
  IMAGE_NAME: bmipfqr326qf/interviewprep-frontend

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Oracle Cloud
    needs: [build]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Save current image tag for rollback
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            cd ~/interviewprep-frontend
            PREV_TAG=$(grep 'IMAGE_TAG=' .env 2>/dev/null | cut -d= -f2 || echo "latest")
            echo "$PREV_TAG" > /tmp/prev_image_tag

      - name: Deploy config files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          source: "docker-compose.yml,docker-entrypoint.sh,nginx.conf.template"
          target: "~/interviewprep-frontend"

      - name: Deploy and verify
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            set -e
            cd ~/interviewprep-frontend

            # Write deployment env file
            echo "OCIR_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" > .env
            echo "IMAGE_TAG=${{ needs.build.outputs.image_tag }}" >> .env
            echo "API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env
            echo "API_BACKEND_URL=http://144.24.99.5:8080" >> .env

            # Log in to OCIR
            echo "${{ secrets.OCIR_AUTH_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.OCIR_USERNAME }}" --password-stdin

            # Pull new image before stopping old containers (zero-downtime)
            docker compose pull frontend

            # Tear down this project's stack
            docker compose down --remove-orphans

            # Clean up any orphaned containers from previous failed deploys
            docker ps -a --filter "name=interviewprep" -q | xargs -r docker rm -f

            # Kill anything on port 80 (fuser may not be installed)
            docker ps --format '{{.ID}} {{.Ports}}' | grep ':80->' | awk '{print $1}' | xargs -r docker rm -f
            ss -tlnp sport = :80 2>/dev/null | grep -oP 'pid=\K[0-9]+' | xargs -r kill -9 2>/dev/null || true

            # Start frontend first, wait for it to be healthy, then start nginx
            docker compose up -d frontend

            echo "Waiting for frontend container to become healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' interviewprep-frontend 2>/dev/null || echo "missing")
              if [ "$STATUS" = "healthy" ]; then
                echo "Frontend is healthy!"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Frontend health check failed after 60s"
                docker logs interviewprep-frontend --tail 50
                exit 1
              fi
              sleep 2
            done

            # Now start nginx (frontend is confirmed healthy)
            docker compose up -d nginx

            # Final check — curl through nginx like backend does
            for i in $(seq 1 15); do
              if curl -sf http://127.0.0.1:80 > /dev/null 2>&1; then
                echo "Nginx is proxying correctly!"
                docker image prune -f
                echo "Deployed: ${{ env.IMAGE_TAG }}"
                exit 0
              fi
              sleep 2
            done

            echo "Frontend failed health check after 60s"
            docker compose logs --tail=50
            exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            set -e
            cd ~/interviewprep-frontend

            PREV_TAG=$(cat /tmp/prev_image_tag 2>/dev/null || echo "latest")
            echo "Rolling back to: $PREV_TAG"

            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$PREV_TAG/" .env
            docker compose down --remove-orphans
            docker ps -a --filter "name=interviewprep" -q | xargs -r docker rm -f
            docker compose up -d frontend
            echo "Waiting for frontend to become healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' interviewprep-frontend 2>/dev/null || echo "missing")
              if [ "$STATUS" = "healthy" ]; then break; fi
              sleep 2
            done
            docker compose up -d nginx
            echo "Rollback complete"
