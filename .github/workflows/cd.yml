name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  REGISTRY: ap-mumbai-1.ocir.io
  IMAGE_NAME: bmipfqr326qf/interviewprep-frontend

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Oracle Cloud
    needs: [build]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Save current image tag for rollback
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            cd ~/interviewprep-frontend
            PREV_TAG=$(grep 'IMAGE_TAG=' .env 2>/dev/null | cut -d= -f2 || echo "latest")
            echo "PREVIOUS_TAG=$PREV_TAG" > /tmp/rollback_info
            cat /tmp/rollback_info

      - name: Deploy config files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          source: "docker-compose.yml,docker-entrypoint.sh,nginx.conf.template"
          target: "~/interviewprep-frontend"

      - name: Deploy and verify
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            set -e

            # Force cleanup: stop ALL containers, then prune
            docker stop $(docker ps -q) 2>/dev/null || true
            docker rm -f $(docker ps -aq) 2>/dev/null || true
            docker network prune -f 2>/dev/null || true

            # Wait for port 80 to be released
            sleep 5

            # Write deployment env file
            cd ~/interviewprep-frontend
            echo "OCIR_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" > .env
            echo "IMAGE_TAG=${{ needs.build.outputs.image_tag }}" >> .env
            echo "API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env
            echo "API_BACKEND_URL=http://144.24.99.5:8080" >> .env

            # Log in to OCIR
            echo "${{ secrets.OCIR_AUTH_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.OCIR_USERNAME }}" --password-stdin

            # Pull new image
            docker compose pull frontend

            # Stop old containers
            docker compose down --remove-orphans

            # Start new containers
            docker compose up -d --remove-orphans

            # Wait for health check
            echo "Waiting for frontend to become healthy..."
            for i in $(seq 1 30); do
              if docker inspect --format='{{.State.Health.Status}}' interviewprep-frontend 2>/dev/null | grep -q "healthy"; then
                echo "Frontend is healthy!"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "Health check timed out!"
                docker compose logs --tail=50
                exit 1
              fi
              sleep 2
            done

            # Prune old images
            docker image prune -f

            echo "Frontend deployed successfully! Image tag: ${{ env.IMAGE_TAG }}"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            set -e
            cd ~/interviewprep-frontend

            # Read previous tag
            PREV_TAG=$(cat /tmp/rollback_info | grep PREVIOUS_TAG | cut -d= -f2)
            echo "Rolling back to previous tag: $PREV_TAG"

            # Update .env with previous tag
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$PREV_TAG/" .env

            # Restart with previous image
            docker compose down
            docker compose up -d --remove-orphans
            echo "Rollback complete!"
