name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

env:
  REGISTRY: ap-mumbai-1.ocir.io
  IMAGE_NAME: bmipfqr326qf/interviewprep-frontend

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Oracle Cloud
    needs: [build]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Save current image tag for rollback
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            cd ~/interviewprep-frontend
            PREV_TAG=$(grep 'IMAGE_TAG=' .env 2>/dev/null | cut -d= -f2 || echo "latest")
            echo "$PREV_TAG" > /tmp/prev_image_tag

      - name: Deploy config files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          source: "docker-compose.yml,docker-entrypoint.sh,nginx.conf.template"
          target: "~/interviewprep-frontend"

      - name: Deploy and verify
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            set -e
            cd ~/interviewprep-frontend

            # Write deployment env file
            echo "OCIR_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" > .env
            echo "IMAGE_TAG=${{ needs.build.outputs.image_tag }}" >> .env
            echo "API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env
            echo "API_BACKEND_URL=http://144.24.99.5:8080" >> .env

            # Log in to OCIR
            echo "${{ secrets.OCIR_AUTH_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.OCIR_USERNAME }}" --password-stdin

            # Pull new image before stopping old containers (zero-downtime)
            docker compose pull frontend

            # Tear down old stack and start fresh
            docker compose down --remove-orphans

            # Kill any orphaned process still holding port 80
            PORT80_PID=$(ss -tlnp sport = :80 | grep -oP 'pid=\K\d+' | head -1)
            if [ -n "$PORT80_PID" ]; then
              echo "Killing orphan process on port 80 (PID: $PORT80_PID)"
              kill -9 "$PORT80_PID" 2>/dev/null || true
            fi

            docker compose up -d --remove-orphans

            # Health check — poll with curl like backend does
            echo "Waiting for frontend to become healthy..."
            for i in $(seq 1 30); do
              if curl -sf http://127.0.0.1:80 > /dev/null 2>&1; then
                echo "Frontend is healthy!"
                docker image prune -f
                echo "Deployed: ${{ env.IMAGE_TAG }}"
                exit 0
              fi
              sleep 2
            done

            echo "Frontend failed health check after 60s"
            docker compose logs --tail=50
            exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            set -e
            cd ~/interviewprep-frontend

            PREV_TAG=$(cat /tmp/prev_image_tag 2>/dev/null || echo "latest")
            echo "Rolling back to: $PREV_TAG"

            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$PREV_TAG/" .env
            docker compose down --remove-orphans
            docker compose up -d --remove-orphans
            echo "Rollback complete"
