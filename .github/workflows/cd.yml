name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

env:
  REGISTRY: ap-mumbai-1.ocir.io
  IMAGE_NAME: bmipfqr326qf/interviewprep-frontend

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Oracle Cloud
    needs: [build]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Save current image tag for rollback
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            cd ~/interviewprep-frontend
            PREV_TAG=$(grep 'IMAGE_TAG=' .env 2>/dev/null | cut -d= -f2 || echo "latest")
            echo "$PREV_TAG" > /tmp/prev_image_tag

      - name: Deploy config files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          source: "docker-compose.yml,docker-entrypoint.sh,nginx.conf.template"
          target: "~/interviewprep-frontend"

      - name: Deploy and verify
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            set -e
            cd ~/interviewprep-frontend

            # Write deployment env file
            echo "OCIR_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" > .env
            echo "IMAGE_TAG=${{ needs.build.outputs.image_tag }}" >> .env
            echo "API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env
            echo "API_BACKEND_URL=http://144.24.99.5:8080" >> .env

            # Log in to OCIR
            echo "${{ secrets.OCIR_AUTH_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.OCIR_USERNAME }}" --password-stdin

            # Remove host nginx — Docker owns port 80
            sudo systemctl stop nginx 2>/dev/null || true
            sudo systemctl disable nginx 2>/dev/null || true
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo rm -f /etc/nginx/conf.d/default.conf
            sudo nginx -s stop 2>/dev/null || true

            # Pull new image before stopping old containers (zero-downtime)
            docker compose pull frontend

            # Tear down and clean up
            docker compose down --remove-orphans

            # Start frontend, wait for health, then start nginx
            docker compose up -d frontend

            echo "Waiting for frontend to become healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' interviewprep-frontend 2>/dev/null || echo "missing")
              if [ "$STATUS" = "healthy" ]; then
                echo "Frontend is healthy!"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: Frontend health check failed"
                docker logs interviewprep-frontend --tail 50
                exit 1
              fi
              sleep 2
            done

            # Start nginx now that frontend is confirmed healthy
            docker compose up -d nginx

            # Verify end-to-end through nginx
            for i in $(seq 1 15); do
              if curl -sf http://127.0.0.1:80 > /dev/null 2>&1; then
                echo "Deployed successfully!"
                docker image prune -f
                exit 0
              fi
              sleep 2
            done

            echo "ERROR: nginx not responding on port 80"
            docker compose logs --tail=50
            exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            set -e
            cd ~/interviewprep-frontend

            PREV_TAG=$(cat /tmp/prev_image_tag 2>/dev/null || echo "latest")
            echo "Rolling back to: $PREV_TAG"

            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$PREV_TAG/" .env
            docker compose down --remove-orphans
            docker compose up -d
            echo "Rollback complete"
