services:
  frontend:
    image: ${OCIR_IMAGE:-ap-mumbai-1.ocir.io/bmipfqr326qf/interviewprep-frontend}:${IMAGE_TAG:-latest}
    container_name: interviewprep-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://144.24.99.5}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: interviewprep-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_healthy
    volumes:
      - ./nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./docker-entrypoint.sh:/docker-entrypoint.sh:ro
    environment:
      API_BACKEND_URL: ${API_BACKEND_URL:-http://144.24.99.5:8080}
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
